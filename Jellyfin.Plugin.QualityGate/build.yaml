version: "2.0.0.0"
targetAbi: "10.11.0.0"
framework: "net9.0"
owner: "GeiserX"
overview: "Restrict users to specific media versions based on configurable path-based policies."
description: "Quality Gate allows Jellyfin administrators to define policies that restrict certain users to specific media versions. This is useful for scenarios where you have both high-quality original files and lower-bitrate transcoded versions, and want to limit some users to only the transcoded versions to save bandwidth or manage access."
category: "General"
imageUrl: ""
artifacts:
  - Jellyfin.Plugin.QualityGate.dll
changelog: |
  ## v2.0.0.0
  - Replaced broken middleware with IAsyncResultFilter (fixes response compression conflict)
  - MediaSource filtering now works correctly with all Jellyfin clients
  - Consolidated plugin service registration
  - Renamed repo from jellyfin-quality-gate to quality-gate
  ## v1.0.11.0
  - Disabled middleware filtering - does not work due to Jellyfin response compression
  ## v1.0.9.0
  - Fixed configuration UI - buttons and dropdowns now work properly
  - Added comprehensive documentation with policy examples
  ## v1.0.0.0
  - Initial release
