name: "Quality Gate"
guid: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
version: "3.1.0.0"
targetAbi: "10.11.0.0"
framework: "net9.0"
owner: "GeiserX"
overview: "Restrict users to specific media versions based on filename regex patterns."
description: "Quality Gate allows Jellyfin administrators to restrict users to specific media versions via filename regex patterns. Designed for Jellyfin multi-version naming (e.g. 'Movie (2021) - 1080p.mkv'). Useful for bandwidth management, tiered access, and device optimization."
category: "General"
imageUrl: ""
artifacts:
  - Jellyfin.Plugin.QualityGate.dll
changelog: |
  ## v3.1.0.0
  - Skip intro on resume: intros no longer play when resuming a movie mid-playback
  - Skip intro on rewatch: for TV shows, intro plays only on the first episode of a series
  - Trimmed config UI: removed path prefix fields, keeping only filename pattern rules
  - Backend path-prefix logic unchanged for backward compatibility
  ## v3.0.0.0
  - Filename regex pattern matching: restrict by filename instead of (or in addition to) path prefixes
  - Supports Jellyfin multi-version naming convention (e.g. `Movie (2021) - 1080p.mkv`)
  - New UI sections for allowed/blocked filename patterns with regex input
  - Case-insensitive regex with 1-second timeout to prevent ReDoS
  - Backward compatible: existing path-prefix-only policies continue to work unchanged
  ## v2.0.6.0
  - Integrated table footer: single full-width tfoot row replacing three-cell layout
  - Stronger zebra striping for visible row differentiation
  - Footer layout: rows-per-page left, range center, nav buttons right
  ## v2.0.5.0
  - Sortable columns, pagination, and stronger zebra striping for the User Access table
  - Inline policy assignment updates (no collectFromDOM rebuild)
  - Path actions moved below path list for clearer layout
  ## v2.0.4.0
  - Reworked the configuration page into a clearer native Jellyfin admin layout
  - Restored the user access table, stronger policy grouping, and destructive delete styling
  ## v2.0.3.0
  - Fail-closed on invalid policy overrides: user assigned to deleted/disabled/mistyped policy is denied (was falling through to full access)
  - Separator-aware path matching: `/media` no longer matches `/media2`
  - Filter QueryResult<BaseItemDto> list endpoints in addition to single items and PlaybackInfo
  ## v2.0.2.0
  - Fail-closed: return empty sources when all are blocked (was keeping originals)
  - Remove dead code: OnPlaybackStart handler, FindAllowedVersion, QualityGateEntryPoint
  - Align README and plugin description with actual behavior
  ## v2.0.1.0
  - Fix IDOR: custom API controller now binds to authenticated caller instead of accepting caller-supplied userId
  - Deny media sources with null/empty paths (fail-closed)
  ## v2.0.0.0
  - Replaced broken middleware with IAsyncResultFilter (fixes response compression conflict)
  - MediaSource filtering now works correctly with all Jellyfin clients
  - Consolidated plugin service registration
  - Renamed repo from jellyfin-quality-gate to quality-gate
  ## v1.0.11.0
  - Disabled middleware filtering - does not work due to Jellyfin response compression
  ## v1.0.9.0
  - Fixed configuration UI - buttons and dropdowns now work properly
  - Added comprehensive documentation with policy examples
  ## v1.0.0.0
  - Initial release
