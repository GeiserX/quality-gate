changelog: |
  ## v1.0.0.9
  - Fixed configuration UI - buttons and dropdowns now work properly
  - Added comprehensive documentation with policy examples
  ## v1.0.0.2
  - Fixed targetAbi for Jellyfin 10.11+
  - Added default policy support
  - Added user overrides with full-access option
  - Added middleware filtering to hide blocked versions
  ## v1.0.0.0
  - Initial release
  - Define path-based quality policies
  - Assign policies to users
  - Filter media sources based on user policies
