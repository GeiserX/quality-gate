<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Quality Gate</title>
</head>
<body>
    <div id="QualityGateConfigPage" data-role="page" class="page type-interior pluginConfigurationPage"
         data-require="emby-input,emby-button,emby-select,emby-checkbox"
         data-controller="__plugin/configPage.js">
        <div data-role="content">
            <div class="content-primary">
                <form id="QualityGateConfigForm" class="qualityGateConfigForm">
                    <div class="verticalSection">
                        <h2 class="sectionTitle">Quality Gate Configuration</h2>
                        <p class="fieldDescription">Restrict users to specific media versions based on file paths.</p>
                        <p id="loadingStatus" style="color: #888;">Loading...</p>
                    </div>

                    <div class="verticalSection">
                        <h3 class="sectionTitle">🌐 Default Policy</h3>
                        <div class="selectContainer">
                            <label class="selectLabel" for="defaultPolicySelect">Default Policy for All Users</label>
                            <select is="emby-select" id="defaultPolicySelect" class="emby-select-withcolor">
                                <option value="">(No default - Full Access)</option>
                            </select>
                        </div>
                    </div>

                    <div class="verticalSection">
                        <h3 class="sectionTitle">📋 Policies</h3>
                        <div id="policiesContainer"></div>
                        <button is="emby-button" type="button" class="raised button-submit" id="btnAddPolicy">
                            <span>+ Add Policy</span>
                        </button>
                    </div>

                    <div class="verticalSection">
                        <h3 class="sectionTitle">👥 User Overrides</h3>
                        <div id="userOverridesContainer"></div>
                        <div style="display: flex; gap: 10px; align-items: center; margin-top: 1em; flex-wrap: wrap;">
                            <select is="emby-select" id="newOverrideUser" style="flex: 1; min-width: 150px;">
                                <option value="">-- Select User --</option>
                            </select>
                            <select is="emby-select" id="newOverridePolicy" style="flex: 1; min-width: 150px;">
                                <option value="">-- Select Policy --</option>
                            </select>
                            <button is="emby-button" type="button" class="raised" id="btnAddOverride">
                                <span>Add Override</span>
                            </button>
                        </div>
                    </div>

                    <div class="verticalSection">
                        <button is="emby-button" type="submit" class="raised button-submit block">
                            <span>💾 Save Configuration</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
