<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B4C9A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1A1A2E;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="fade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="900" height="200" rx="12" fill="url(#bg)"/>
  <rect width="900" height="200" rx="12" fill="url(#fade)"/>
  <!-- Subtle grid -->
  <g stroke="white" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="500" y1="0" x2="500" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="700" y1="0" x2="700" y2="200"/>
    <line x1="800" y1="0" x2="800" y2="200"/>
  </g>
  <!-- Film reel icon (muted/faded) -->
  <g transform="translate(120, 100)" opacity="0.55">
    <!-- Outer reel circle -->
    <circle cx="0" cy="0" r="48" fill="none" stroke="white" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="12" fill="none" stroke="white" stroke-width="2"/>
    <!-- Sprocket holes -->
    <circle cx="0" cy="-32" r="5" fill="none" stroke="white" stroke-width="1.5"/>
    <circle cx="0" cy="32" r="5" fill="none" stroke="white" stroke-width="1.5"/>
    <circle cx="32" cy="0" r="5" fill="none" stroke="white" stroke-width="1.5"/>
    <circle cx="-32" cy="0" r="5" fill="none" stroke="white" stroke-width="1.5"/>
    <circle cx="22.6" cy="-22.6" r="5" fill="none" stroke="white" stroke-width="1.5"/>
    <circle cx="-22.6" cy="22.6" r="5" fill="none" stroke="white" stroke-width="1.5"/>
    <circle cx="22.6" cy="22.6" r="5" fill="none" stroke="white" stroke-width="1.5"/>
    <circle cx="-22.6" cy="-22.6" r="5" fill="none" stroke="white" stroke-width="1.5"/>
    <!-- Spokes -->
    <line x1="0" y1="-12" x2="0" y2="-48" stroke="white" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="12" x2="0" y2="48" stroke="white" stroke-width="1" opacity="0.4"/>
    <line x1="12" y1="0" x2="48" y2="0" stroke="white" stroke-width="1" opacity="0.4"/>
    <line x1="-12" y1="0" x2="-48" y2="0" stroke="white" stroke-width="1" opacity="0.4"/>
    <!-- Gate / barrier overlay -->
    <rect x="50" y="-8" width="30" height="3" rx="1.5" fill="white" opacity="0.7"/>
    <rect x="50" y="5" width="30" height="3" rx="1.5" fill="white" opacity="0.7"/>
    <rect x="48" y="-14" width="4" height="28" rx="2" fill="white" opacity="0.6"/>
  </g>
  <!-- Title text (muted for deprecation) -->
  <text x="480" y="88" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="50" font-weight="bold" fill="white" text-anchor="middle" opacity="0.7">Jellyfin Quality Gate</text>
  <!-- Subtitle -->
  <text x="480" y="128" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="17" fill="white" text-anchor="middle" opacity="0.45">Media access control for Jellyfin (deprecated)</text>
</svg>