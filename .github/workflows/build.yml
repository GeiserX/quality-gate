name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      
      - name: Restore dependencies
        run: dotnet restore
      
      - name: Build
        run: dotnet build -c Release --no-restore
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jellyfin-quality-gate
          path: |
            Jellyfin.Plugin.QualityGate/bin/Release/net8.0/Jellyfin.Plugin.QualityGate.dll
            Jellyfin.Plugin.QualityGate/build.yaml
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: jellyfin-quality-gate
          path: release
      
      - name: Create zip
        run: |
          cd release
          zip -r ../jellyfin-quality-gate.zip .
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: jellyfin-quality-gate.zip
          generate_release_notes: true

