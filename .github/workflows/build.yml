name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version and check tag
        id: check
        run: |
          VERSION=$(grep -oP '(?<=<Version>)[^<]+' Jellyfin.Plugin.QualityGate/Jellyfin.Plugin.QualityGate.csproj)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q .; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "::notice::Tag v${VERSION} already exists — skipping release"
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: [check-version]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Run tests
        run: dotnet test --no-build -c Release --verbosity normal

      - name: Get version from csproj
        id: version
        run: |
          VERSION=$(grep -oP '(?<=<Version>)[^<]+' Jellyfin.Plugin.QualityGate/Jellyfin.Plugin.QualityGate.csproj)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create plugin package
        run: |
          mkdir -p release
          cp Jellyfin.Plugin.QualityGate/bin/Release/net9.0/Jellyfin.Plugin.QualityGate.dll release/
          cp Jellyfin.Plugin.QualityGate/bin/Release/net9.0/build.yaml release/ 2>/dev/null || true
          cd release && zip -r ../quality-gate_${{ steps.version.outputs.version }}.zip .

      - name: Calculate checksum
        id: checksum
        run: |
          CHECKSUM=$(md5sum quality-gate_${{ steps.version.outputs.version }}.zip | cut -d ' ' -f 1)
          echo "checksum=$CHECKSUM" >> $GITHUB_OUTPUT

      - name: Update manifest.json
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CHECKSUM="${{ steps.checksum.outputs.checksum }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Build new version entry
          NEW_ENTRY=$(cat <<ENTRY
          {
            "version": "${VERSION}",
            "changelog": "See https://github.com/GeiserX/quality-gate/releases",
            "targetAbi": "10.11.0.0",
            "sourceUrl": "https://github.com/GeiserX/quality-gate/releases/download/v${VERSION}/quality-gate_${VERSION}.zip",
            "checksum": "${CHECKSUM}",
            "timestamp": "${TIMESTAMP}"
          }
          ENTRY
          )

          # Merge into existing manifest: prepend new version, remove duplicates
          python3 -c "
          import json, sys
          with open('manifest.json') as f:
              manifest = json.load(f)
          new_entry = json.loads('''${NEW_ENTRY}''')
          versions = manifest[0].get('versions', [])
          versions = [v for v in versions if v['version'] != new_entry['version']]
          versions.insert(0, new_entry)
          manifest[0]['versions'] = versions
          with open('manifest.json', 'w') as f:
              json.dump(manifest, f, indent=2, ensure_ascii=False)
              f.write('\n')
          "

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Quality Gate v${{ steps.version.outputs.version }}
          files: quality-gate_${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
