name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Create plugin package
        run: |
          mkdir -p artifacts
          cp Jellyfin.Plugin.QualityGate/bin/Release/net9.0/Jellyfin.Plugin.QualityGate.dll artifacts/
          cp Jellyfin.Plugin.QualityGate/bin/Release/net9.0/build.yaml artifacts/
          cd artifacts && zip -r ../quality-gate.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-plugin
          path: quality-gate.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: quality-gate-plugin

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Quality Gate v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: quality-gate.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update manifest.json
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          CHECKSUM=$(sha256sum quality-gate.zip | awk '{print $1}')
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cat > manifest.json << EOF
          [
            {
              "guid": "a1b2c3d4-e5f6-7890-abcd-ef1234567890",
              "name": "Quality Gate",
              "overview": "Restrict users to specific media versions based on configurable path-based policies.",
              "description": "Quality Gate allows Jellyfin administrators to define policies that restrict certain users to specific media versions. This is useful for scenarios where you have both high-quality original files and lower-bitrate transcoded versions, and want to limit some users to only the transcoded versions to save bandwidth or manage access.",
              "owner": "GeiserX",
              "category": "General",
              "imageUrl": "",
              "versions": [
                {
                  "version": "${VERSION}",
                  "changelog": "See https://github.com/GeiserX/quality-gate/releases/tag/v${VERSION}",
                  "targetAbi": "10.11.0.0",
                  "sourceUrl": "https://github.com/GeiserX/quality-gate/releases/download/v${VERSION}/quality-gate.zip",
                  "checksum": "${CHECKSUM}",
                  "timestamp": "${TIMESTAMP}"
                }
              ]
            }
          ]
          EOF

      - name: Commit manifest update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update manifest.json for v${{ steps.version.outputs.VERSION }}"
          file_pattern: manifest.json
          branch: main
